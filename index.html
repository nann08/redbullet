<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Arcade Runner: Red Bullets — Hybrid Audio</title>
<style>
  body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh}
  canvas{image-rendering:pixelated;border:2px solid #333}
</style>
</head>
<body>
<canvas id="game" width="800" height="400"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

// --- HYBRID AUDIO SYSTEM ---
const AudioSys = {
    ctx: null,
    noiseBuffer: null,
    initialized: false,
    bgTrack: new Audio('./music.mp3'),

    init: function() {
        if (this.initialized) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        const bufferSize = this.ctx.sampleRate * 2; 
        this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = this.noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        this.bgTrack.loop = true;
        this.bgTrack.volume = 0.5;
        this.initialized = true;
    },

    shoot: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },

    jump: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },

    explode: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    },

    crash: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
    },
    
    sword: function() {
        if (!this.ctx) return;
        const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuffer;
        const filter = this.ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000;
        const gain = this.ctx.createGain();
        src.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        src.start(); src.stop(this.ctx.currentTime + 0.1);
    },

    startMusic: function() {
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
        this.bgTrack.play().catch(e => console.log("Music waiting for interaction"));
    },

    stopMusic: function() {
        this.bgTrack.pause(); this.bgTrack.currentTime = 0;
    }
};

function initAudio() {
    AudioSys.init();
    if (AudioSys.ctx && AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
}

// --- GAME STATE ---
let player={x:50,y:300,w:16,h:32,vy:0,jumping:false,frame:0,swinging:false,swingFrame:0,recoil:0};
let gravity=1,jumpPower=-18,fastFallPower=3;
let obstacles=[],clouds=[],bullets=[],enemies=[],sparks=[],muzzleFlashes=[],stars=[],planets=[],dusts=[];
let enemyBullets=[],platforms=[],electricWalls=[];
let score=0,highScore=0,speed=5,gameOver=false,frameCount=0;
let keysDown={},shootCooldown=0,started=false,shake=0;
let readyToStart = true; 
let currentTransition = 0, targetTransition = 0, transitionTimer = 0;
let obstacleTimer = 0, enemyTimer = 40, lastObstacleCount = 1;

const STAR_COUNT=80;
const PLANET_COUNT=3;
for(let i=0;i<STAR_COUNT;i++)stars.push({x:Math.random()*800,y:Math.random()*380,size:1+Math.random()*2,speed:0.2+Math.random()*0.3});
for(let i=0;i<PLANET_COUNT;i++)planets.push({x:Math.random()*800,y:20+Math.random()*100,size:30+Math.random()*40,speed:0.08+Math.random()*0.12,hue:200+Math.random()*40});

function applyShake(){if(shake>0){const sx=(Math.random()-0.5)*shake;const sy=(Math.random()-0.5)*shake;ctx.translate(sx,sy);shake=Math.max(0,shake-0.5);}}

function getColorTransition() { return currentTransition; }

function drawStars(){
    let t = getColorTransition();
    
    // Background: #111 to a softer gray (restored light vibes)
    let bg = Math.floor(17 + t * (180 - 17)); 
    ctx.fillStyle = `rgb(${bg},${bg},${bg})`;
    ctx.fillRect(0,0,800,400);
    
    // Stars: White to Black
    let starC = Math.floor(255 - t * 255); 
    stars.forEach(s=>{
        ctx.fillStyle=`rgba(${starC},${starC},${starC},0.9)`;
        ctx.fillRect(s.x,s.y,s.size,s.size);
    });
    
    // Planets (Blue cloud things): Restored to Pink
    planets.forEach(p=>{
        let currentHue = p.hue + t * (330 - p.hue); 
        let currentL = 45 + t * 30; // Brighten slightly when pink
        ctx.fillStyle=`hsl(${currentHue} 70% ${currentL}%)`;
        ctx.beginPath(); ctx.ellipse(p.x,p.y,p.size,p.size*0.6,0,0,Math.PI*2); ctx.fill();
        
        ctx.fillStyle=`rgba(${starC},${starC},${starC},0.06)`;
        ctx.beginPath(); ctx.ellipse(p.x-6,p.y-6,p.size*0.5,p.size*0.3,0,0,Math.PI*2); ctx.fill();
    });
}

function drawGround(){ctx.fillStyle='green';ctx.fillRect(0,332,800,16);}

function drawClouds(){
    let t = getColorTransition();
    // Regular clouds: Gray to a muted pinkish hue (restored)
    let r = Math.floor(128 + t * (190 - 128)); 
    let g = Math.floor(128 + t * (140 - 128));
    let b = Math.floor(128 + t * (160 - 128));
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    clouds.forEach(c=>ctx.fillRect(c.x,c.y,c.size,c.size/2));
}

function drawPlayer(){
    let t = getColorTransition();
    let bodyGray = Math.floor(255 - t * 200); 
    let bodyColor = `rgb(${bodyGray},${bodyGray},${bodyGray})`;
    let recoilOffset=player.recoil>0?-2:0;
    
    ctx.fillStyle=bodyColor; ctx.fillRect(player.x+recoilOffset,player.y-16,player.w,32);
    ctx.fillStyle='black'; ctx.fillRect(player.x+2+recoilOffset,player.y-12,12,4);
    
    ctx.fillStyle=bodyColor;
    let legSwing=Math.sin(player.frame*0.3)*2;
    ctx.fillRect(player.x-2+recoilOffset,player.y+16+legSwing,4,8);
    ctx.fillRect(player.x+14+recoilOffset,player.y+16-legSwing,4,8);
    
    ctx.fillStyle='blue'; ctx.fillRect(player.x-4+recoilOffset,player.y-10,4,2);
    
    if(player.swinging){
        ctx.strokeStyle='silver';ctx.lineWidth=4;let swingLength=40;let angle=Math.PI/4-(player.swingFrame/5)*(Math.PI/2);let sx=player.x+player.w/2,sy=player.y;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+swingLength*Math.cos(angle),sy-swingLength*Math.sin(angle));ctx.stroke();
    }
}

function drawEnemies(){
    enemies.forEach(e=>{
        if(e.exploding>0){
            let progress=7-e.exploding;let offset=progress*2;
            if(e.exploding===1){ctx.fillStyle='white';ctx.beginPath();ctx.arc(e.x+e.w/2,e.y+e.h/2,14,0,Math.PI*2);ctx.fill();}
            else{ctx.fillStyle='orange';ctx.beginPath();ctx.arc(e.x+e.w/2-offset,e.y+e.h/2,7,Math.PI/2,Math.PI*3/2);ctx.arc(e.x+e.w/2+offset,e.y+e.h/2,7,-Math.PI/2,Math.PI/2);ctx.fill();}
            e.exploding--;if(e.exploding===0)e.remove=true;
        }else{
            if (e.type === 'dog') {
                e.frame++;
                ctx.fillStyle='#aab8c2'; ctx.fillRect(e.x, e.y, e.w, e.h); // Lighter silver body
                ctx.strokeStyle='#00ffff'; ctx.lineWidth=2; ctx.strokeRect(e.x, e.y, e.w, e.h); // Cyan glowing outline
                ctx.fillStyle='#00ffff'; ctx.fillRect(e.x+4, e.y+4, 4, 4);  // Cyan eye (doesn't look like bullet)
                let legOffset = Math.sin(e.frame * 0.5) * 4;
                ctx.fillStyle='#555'; 
                ctx.fillRect(e.x+4+legOffset, e.y+16, 4, 6);
                ctx.fillRect(e.x+20-legOffset, e.y+16, 4, 6);
            } else if (e.type === 'rival') {
                e.frame++;
                ctx.fillStyle='#ff0033'; ctx.fillRect(e.x, e.y, e.w, 32); // Red body
                ctx.fillStyle='gold'; ctx.fillRect(e.x-2, e.y+4, 12, 4); // Gold Visor
                ctx.fillStyle='black'; ctx.fillRect(e.x+12, e.y+6, 8, 4); // Black Scarf
                let legSwing = Math.sin(e.frame * 0.3) * 2;
                ctx.fillStyle='#ff0033';
                ctx.fillRect(e.x+2, e.y+32+legSwing, 4, 8);
                ctx.fillRect(e.x+10, e.y+32-legSwing, 4, 8);
            } else {
                ctx.fillStyle='orange';ctx.beginPath();ctx.arc(e.x+12,e.y+12,14,0,Math.PI*2);ctx.fill();
                ctx.strokeStyle='lightyellow';ctx.beginPath();ctx.ellipse(e.x+12,e.y+12,18,7,Math.PI/6,0,Math.PI*2);ctx.stroke();
            }
        }
    });
}

function drawEnemyBullets() {
    ctx.fillStyle = '#ff00ff';
    enemyBullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,0,255,0.4)'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r+4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle='#ff00ff';
    });
}

function drawPlatforms() {
    platforms.forEach(p => {
        ctx.fillStyle = '#111'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#0ff'; ctx.fillRect(p.x, p.y, p.w, 2); // Neon Cyan Edge
    });
}

function drawElectricWalls() {
    electricWalls.forEach(w => {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.2)'; ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = 'red'; ctx.lineWidth = 2; ctx.strokeRect(w.x, w.y, w.w, w.h);
        ctx.beginPath(); ctx.strokeStyle = (frameCount%4<2) ? 'white' : 'yellow';
        ctx.moveTo(w.x + w.w/2, w.y);
        for(let y=w.y; y<w.y+w.h; y+=15) { ctx.lineTo(w.x + Math.random()*w.w, y); }
        ctx.stroke();
    });
}

function drawBullets(){bullets.forEach(b=>{for(let t=0;t<3;t++){let tx=b.x-t*4;ctx.fillStyle=`rgba(255,50,50,${0.12*(3-t)})`;ctx.fillRect(tx,b.y-2,6,3);}ctx.fillStyle='red';ctx.fillRect(b.x,b.y-2,8,4);});}
function drawSparks(){sparks.forEach(s=>{ctx.fillStyle=`rgba(255,${200+Math.random()*55},0,${s.life/7})`;ctx.fillRect(s.x,s.y,2,2);});}
function drawMuzzleFlashes(){muzzleFlashes.forEach(f=>{ctx.fillStyle='white';ctx.fillRect(f.x,f.y,f.w,f.h);ctx.fillStyle='orange';ctx.fillRect(f.x,f.y+1,f.w-1,f.h-2);});}
function drawDust(){dusts.forEach(d=>{ctx.fillStyle=`rgba(120,80,40,${d.life/12})`;ctx.fillRect(d.x,d.y,3,2);});}
function drawText(){ctx.fillStyle='white';ctx.font='16px monospace';ctx.fillText('Score:'+score,650,20);ctx.fillText('High:'+highScore,650,40);if(!started&&!gameOver){ctx.fillText('Press W to jump, Space to shoot, D to swing',50,200);}if(gameOver){ctx.fillText('Game Over! Press W to jump, Space to shoot, D to swing',50,200);}}

function drawObstacles(){
    let t = getColorTransition();
    let mainCol = `rgb(${128-t*100},${128-t*100},${128-t*100})`; // Turns dark against pink sky
    let dotCol = `rgb(${169-t*140},${169-t*140},${169-t*140})`;
    let outlineCol = t > 0.3 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0)'; // White outline pops when bright
    
    obstacles.forEach(o=>{
        ctx.fillStyle=mainCol;
        ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.w/2,o.y-o.h);ctx.lineTo(o.x+o.w,o.y);ctx.closePath();ctx.fill();
        ctx.strokeStyle=outlineCol; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle=dotCol;
        ctx.beginPath();ctx.arc(o.x+o.w/2,o.y-o.h/2,o.h/4,0,Math.PI*2);ctx.fill();
    });
}

function spawnObstacle(){
    // Spawn Massive Electric Walls after 4500 points
    if (score > 4500 && Math.random() > 0.85) {
        let wallH = 150;
        electricWalls.push({x: 800 + 150, y: 332 - wallH, w: 40, h: wallH});
        // Generate jumping platforms to clear it
        platforms.push({x: 800, y: 250, w: 60, h: 10});
        platforms.push({x: 800 + 110, y: 150, w: 60, h: 10});
        platforms.push({x: 800 + 220, y: 150, w: 60, h: 10});
        lastObstacleCount = 3;
        return;
    }
    
    let h=40+Math.random()*20;
    lastObstacleCount = 1;
    if (score > 1000 && Math.random() > 0.7) lastObstacleCount = 2;
    if (score > 2500 && Math.random() > 0.8) lastObstacleCount = 3;
    for(let i=0; i<lastObstacleCount; i++) {
        obstacles.push({x:800 + i*48,y:332,w:48,h:h});
    }
}
function spawnCloud(){clouds.push({x:800,y:Math.random()*100+50,size:16+Math.random()*8});}

function spawnEnemy(){
    let type = 'orb';
    if (score > 6000 && Math.random() > 0.6) type = 'rival';
    else if (score > 3500 && Math.random() > 0.5) type = 'dog';

    if (type === 'dog') {
        enemies.push({type: 'dog', x: 800, y: 316, w: 32, h: 16, vx: speed * 1.3, vy: 0, exploding: 0, remove: false, frame: 0});
    } else if (type === 'rival') {
        enemies.push({type: 'rival', x: 800, y: 300, w: 16, h: 32, vx: speed, vy: 0, exploding: 0, remove: false, frame: 0, shootTimer: 40});
    } else {
        let yPos=170+Math.random()*100; let baseSpeed=speed+1.1+Math.random()*0.7;
        enemies.push({type: 'orb', x: 800, y: yPos, w: 28, h: 28, vy: Math.random()*1-0.5, vx: baseSpeed, exploding: 0, remove: false});
    }
}

function spawnSparks(x,y){for(let i=0;i<10;i++){sparks.push({x:x,y:y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:7});}}
function spawnMuzzleFlash(){let flashWidth=4+Math.random()*4;muzzleFlashes.push({x:player.x+player.w,y:player.y+player.h/2-15,w:flashWidth,h:4,life:2});}

function update(){
    if(gameOver||!started)return;
    
    // Background Color Transitions
    if(score >= 2000) {
        if(transitionTimer <= 0) {
            if(targetTransition === 1) { targetTransition = 0; transitionTimer = 300 + Math.random() * 600; } 
            else { targetTransition = 1; transitionTimer = 120 + Math.random() * 180; }
        } else { transitionTimer--; }
        currentTransition += (targetTransition - currentTransition) * 0.008;
    } else { currentTransition = 0; targetTransition = 0; transitionTimer = 0; }
    
    player.frame++;
    player.vy+=gravity;
    if(keysDown['KeyS']&&player.jumping)player.vy+=fastFallPower;
    let wasAir=player.jumping;
    player.y+=player.vy;
    
    // Platform Physics
    let onPlatform = false;
    platforms.forEach(p => {
        if (player.vy >= 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h >= p.y && player.y + player.h - player.vy <= p.y + 16) {
            player.y = p.y - player.h; player.vy = 0; player.jumping = false; onPlatform = true;
        }
    });
    
    if(player.y>300){
        player.y=300;player.vy=0;player.jumping=false;
        if(wasAir){ for(let i=0;i<6;i++)dusts.push({x:player.x+6+Math.random()*8,y:player.y+18,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:12}); }
    } else if (!onPlatform && player.y < 300) {
        player.jumping = true; // Makes player fall if walking off a platform
    }
    
    // Dynamic Spawners
    if(obstacleTimer <= 0) {
        spawnObstacle();
        obstacleTimer = Math.max(35, 85 - speed * 3) + (lastObstacleCount - 1) * 15; 
    } else { obstacleTimer--; }
    
    if(enemyTimer <= 0) {
        spawnEnemy();
        enemyTimer = Math.max(40, 95 - speed * 3);
    } else { enemyTimer--; }
    
    if(frameCount%200===0)spawnCloud();
    if(frameCount%240===0){let change=(Math.random()*2-1)*1.5;speed+=change;if(speed<4)speed=4;if(speed>11)speed=11;} // Capped from 15 to 11
    
    // Environment Movement
    obstacles.forEach(o=>o.x-=speed); obstacles=obstacles.filter(o=>o.x+o.w>0);
    platforms.forEach(p=>p.x-=speed); platforms=platforms.filter(p=>p.x+p.w>0);
    electricWalls.forEach(w=>w.x-=speed); electricWalls=electricWalls.filter(w=>w.x+w.w>0);
    clouds.forEach(c=>c.x-=1); clouds=clouds.filter(c=>c.x+c.size>0);
    stars.forEach(s=>{s.x-=s.speed;if(s.x<0)s.x=800;});
    planets.forEach(p=>{p.x-=p.speed;if(p.x<-p.size)p.x=800+Math.random()*200;});
    
    // Enemy Movement & Logic
    enemies.forEach(e=>{
        if(!e.exploding){
            e.x-=e.vx;
            if(e.type==='orb') { e.y+=e.vy; if(e.y<150||e.y>300)e.vy*=-1; }
            if(e.type==='rival') {
                e.shootTimer--;
                if(e.shootTimer <= 0) {
                    enemyBullets.push({x: e.x, y: e.y + 12, r: 4, vx: speed + 4});
                    e.shootTimer = 60 + Math.random() * 40;
                }
            }
        }
    });
    enemies=enemies.filter(e=>!e.remove&&e.x>-50);
    
    enemyBullets.forEach(b => b.x -= b.vx);
    enemyBullets = enemyBullets.filter(b => b.x > 0 && !b.remove);
    
    // Bullet Collisions
    bullets.forEach((b,i)=>{
        b.x+=12;
        sparks.push({x:b.x-2,y:b.y,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:5});
        
        // Red Bullets Clash with Purple Bullets
        enemyBullets.forEach(eb => {
            if (!b.remove && !eb.remove && Math.abs(b.x - eb.x) < 16 && Math.abs(b.y - eb.y) < 16) {
                b.remove = true; eb.remove = true; spawnSparks(b.x, b.y); AudioSys.explode();
            }
        });

        enemies.forEach(e=>{
            if(!e.exploding && !b.remove && e.type !== 'dog') { // Dogs are immune to bullets
                let eHitX = e.x; let eHitY = e.y; let eW = e.w; let eH = e.type==='orb'?28:32;
                if(b.x > eHitX && b.x < eHitX + eW && b.y > eHitY && b.y < eHitY + eH) {
                    e.exploding=7; AudioSys.explode(); spawnSparks(eHitX+eW/2, eHitY+eH/2);
                    b.remove=true; score+=12; shake=Math.max(shake,6);
                }
            }
        });
    });
    bullets=bullets.filter(b=>!b.remove&&b.x<820);
    
    // Sword Collisions (Kills everything, including the Dog)
    if(player.swinging){
        let swingLength=40;let angle=Math.PI/4-(player.swingFrame/5)*(Math.PI/2);let sx=player.x+player.w/2,sy=player.y;
        enemies.forEach(e=>{
            let eHitX = e.x+e.w/2; let eHitY = e.y+e.h/2;
            let dx=eHitX-sx, dy=eHitY-sy; let dist=Math.sqrt(dx*dx+dy*dy);
            if(!e.exploding&&dist<swingLength+12){
                e.exploding=7; AudioSys.explode(); spawnSparks(eHitX,eHitY); score+=12; shake=Math.max(shake,5);
            }
        });
        player.swingFrame++;if(player.swingFrame>5){player.swinging=false;player.swingFrame=0;}
    }
    
    if(player.recoil>0)player.recoil--;
    sparks.forEach((s,i)=>{s.x+=s.vx;s.y+=s.vy;s.vx*=0.95;s.vy*=0.95;s.life--;if(s.life<=0)sparks.splice(i,1);});
    muzzleFlashes.forEach((f,i)=>{f.life--;if(f.life<=0)muzzleFlashes.splice(i,1);});
    dusts.forEach((d,i)=>{d.x+=d.vx;d.y+=d.vy;d.vy+=0.2;d.life--;if(d.life<=0)dusts.splice(i,1);});
    if(shootCooldown>0)shootCooldown--;
    
    // Player Deaths
    const crashGame = (shakeAmt) => {
        gameOver=true; AudioSys.crash(); AudioSys.stopMusic();
        if(score>highScore)highScore=score; shake=shakeAmt;
    };

    obstacles.forEach(o=>{ 
        // Shrunk Hitbox: Takes away 25% empty space from the left/right corners, and cuts off the very tip
        let hitX = o.x + o.w * 0.25; 
        let hitW = o.w * 0.5;
        let hitY = o.y - o.h * 0.7; 
        if(player.x < hitX + hitW && player.x + player.w > hitX && player.y + player.h > hitY) crashGame(12); 
    });
    electricWalls.forEach(w=>{ if(player.x<w.x+w.w&&player.x+player.w>w.x&&player.y+player.h>w.y) crashGame(16); });
    enemyBullets.forEach(eb=>{ if(!eb.remove && player.x<eb.x+eb.r&&player.x+player.w>eb.x-eb.r&&player.y+player.h>eb.y-eb.r&&player.y<eb.y+eb.r) crashGame(12); });
    enemies.forEach(e=>{
        if(!e.exploding){
            let eH = e.type==='orb'?28:(e.type==='dog'?16:32);
            if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y+player.h>e.y&&player.y<e.y+eH) crashGame(14);
        }
    });
    
    score++;
    if(score%150===0) { speed+=0.5; if(speed>11)speed=11; } // Capped from 15 to 11
}

function jump(){
    if(!player.jumping&&!gameOver){
        player.vy=jumpPower;player.jumping=true; AudioSys.jump(); initAudio();
    }
}
function shoot(){
    if(!gameOver&&shootCooldown===0&&started){
        bullets.push({x:player.x+player.w+4,y:player.y+player.h/2-14});
        spawnMuzzleFlash(); AudioSys.shoot(); initAudio();
        shootCooldown=6;player.recoil=3;
    }
}
function swing(){
    if(!player.swinging&&!gameOver&&started){
        player.swinging=true;player.swingFrame=0; AudioSys.sword(); initAudio();
    }
}
function resetGame(){
    gameOver=false;obstacles=[];clouds=[];enemies=[];bullets=[];sparks=[];muzzleFlashes=[];
    enemyBullets=[];platforms=[];electricWalls=[];
    player.y=300;player.vy=0;score=0;speed=5;frameCount=0;player.recoil=0;started=false;
    readyToStart = true; currentTransition = 0; targetTransition = 0; transitionTimer = 0;
    obstacleTimer = 0; enemyTimer = 40; lastObstacleCount = 1; AudioSys.stopMusic();
}

document.addEventListener('keydown',e=>{
    keysDown[e.code]=true;
    if(e.code==='KeyW'){
        initAudio();
        if(gameOver){ resetGame(); } else if(!started){ if (readyToStart) { started=true; readyToStart=false; AudioSys.startMusic(); } } else { jump(); }
    }
    if(e.code==='Space'){shoot();}
    if(e.code==='KeyD'){swing();}
});

document.addEventListener('keyup',e=>{
    keysDown[e.code]=false;
    if(e.code==='KeyW' && !started && !gameOver){ readyToStart = true; }
});

function loop(){
    frameCount++;
    ctx.save();
    applyShake();
    drawStars();drawGround();drawClouds();drawPlayer();
    drawPlatforms();drawElectricWalls();drawObstacles();
    drawEnemies();drawBullets();drawEnemyBullets();
    drawSparks();drawMuzzleFlashes();drawDust();drawText();
    ctx.restore();
    if(!started&&!gameOver){player.frame++;}
    update();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
