<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>redbullet</title>
<style>
  body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh}
  canvas{image-rendering:pixelated;border:2px solid #333}
</style>
</head>
<body>
<canvas id="game" width="800" height="400"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

// --- HYBRID AUDIO SYSTEM ---
const AudioSys = {
    ctx: null,
    noiseBuffer: null,
    initialized: false,
    bgTrack: new Audio('./music.mp3'),

    init: function() {
        if (this.initialized) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        const bufferSize = this.ctx.sampleRate * 2; 
        this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = this.noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        this.bgTrack.loop = true;
        this.bgTrack.volume = 0.5;
        this.initialized = true;
    },

    shoot: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },

    jump: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },

    explode: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    },

    crash: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
    },
    
    sword: function() {
        if (!this.ctx) return;
        const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuffer;
        const filter = this.ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000;
        const gain = this.ctx.createGain();
        src.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        src.start(); src.stop(this.ctx.currentTime + 0.1);
    },

    startMusic: function() {
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
        this.bgTrack.play().catch(e => console.log("Music waiting for interaction"));
    },

    stopMusic: function() {
        this.bgTrack.pause(); this.bgTrack.currentTime = 0;
    }
};

function initAudio() {
    AudioSys.init();
    if (AudioSys.ctx && AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
}

// --- GAME STATE ---
let player={
    x:50,y:300,w:16,h:32,vy:0,
    jumping:false,
    frame:0,
    swinging:false,
    swingFrame:0,
    recoil:0,
    coyoteTime:0, 
    jumpBuffer:0,
    scaleX:1, 
    scaleY:1  
};

let trails=[], grassParticles=[], casings=[], floatingTexts=[], markers=[], shatterParticles=[];
let shake=0;
let nextMarkerScore = 1000;

let gravity=1,jumpPower=-18,fastFallPower=3;
let obstacles=[],clouds=[],bullets=[],enemies=[],sparks=[],muzzleFlashes=[],stars=[],planets=[],dusts=[];
let enemyBullets=[],platforms=[],electricWalls=[];
let score=0,highScore=0,speed=5,gameOver=false,frameCount=0;
let keysDown={}, shootCooldown=0,started=false;
let readyToStart = true; 
let currentTransition = 0, targetTransition = 0, transitionTimer = 0;
let obstacleTimer = 0, enemyTimer = 40, lastObstacleCount = 1;

// --- INPUT TRACKING ---
let lastGamepadButtons = [];
let lastGamepadStickActive = false; 

const STAR_COUNT=80;
const PLANET_COUNT=3;
for(let i=0;i<STAR_COUNT;i++)stars.push({x:Math.random()*800,y:Math.random()*380,size:1+Math.random()*2,speed:0.2+Math.random()*0.3});
for(let i=0;i<PLANET_COUNT;i++)planets.push({x:Math.random()*800,y:20+Math.random()*100,size:30+Math.random()*40,speed:0.08+Math.random()*0.12,hue:200+Math.random()*40});

function applyShake(){
    if(shake>0){
        const sx=(Math.random()-0.5)*shake; 
        const sy=(Math.random()-0.5)*shake; 
        ctx.translate(sx, sy);
        shake=Math.max(0,shake-0.5);
    }
}

function getColorTransition() { return currentTransition; }

function drawStars(){
    let t = getColorTransition();
    let bg = Math.floor(17 + t * (180 - 17)); 
    ctx.fillStyle = `rgb(${bg},${bg},${bg})`;
    ctx.fillRect(0,0,800,400);
    let starC = Math.floor(255 - t * 255); 
    stars.forEach(s=>{
        ctx.fillStyle=`rgba(${starC},${starC},${starC},0.9)`;
        ctx.fillRect(s.x,s.y,s.size,s.size);
    });
    planets.forEach(p=>{
        let currentHue = p.hue + t * (330 - p.hue); 
        let currentL = 45 + t * 30; 
        ctx.fillStyle=`hsl(${currentHue} 70% ${currentL}%)`;
        ctx.beginPath(); ctx.ellipse(p.x,p.y,p.size,p.size*0.6,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`rgba(${starC},${starC},${starC},0.06)`;
        ctx.beginPath(); ctx.ellipse(p.x-6,p.y-6,p.size*0.5,p.size*0.3,0,0,Math.PI*2); ctx.fill();
    });
}

let groundScroll = 0;
let lightScroll = 0;

function drawGround(){
    let t = getColorTransition();
    let groundBaseCol = Math.floor(240 - t * 200); 

    if (started && !gameOver) {
        groundScroll = (groundScroll - speed) % 320;
        lightScroll -= speed;
    }
    
    // --- THRUSTER LOGIC SAVED FOR LATER (COMMENTED OUT) ---
    /*
    for(let i = 0; i < 4; i++) {
        let x = groundScroll + i * 320;
        if (x < -100) x += 1280; 
        if (x > 900) continue; 

        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.moveTo(x - 10, 356);
        ctx.lineTo(x + 10, 356);
        ctx.lineTo(x + 15, 370);
        ctx.lineTo(x - 15, 370);
        ctx.closePath();
        ctx.fill();

        let flameSize = 10 + Math.random() * 15;
        let flicker = Math.random();
        
        ctx.fillStyle = `rgba(0, 242, 255, ${0.4 + flicker * 0.4})`;
        ctx.beginPath();
        ctx.moveTo(x - 8, 370);
        ctx.lineTo(x + 8, 370);
        ctx.lineTo(x, 370 + flameSize * 0.6);
        ctx.fill();
        
        ctx.fillStyle = `rgba(255, 100, 0, ${0.2 + flicker * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(x - 12, 370);
        ctx.lineTo(x + 12, 370);
        ctx.lineTo(x, 370 + flameSize);
        ctx.fill();
    }
    */

    // 1. Draw Hover Floating Light (Cyan/Blue logic)
    // Create a steady atmospheric glow under the floor
    let hoverGradient = ctx.createLinearGradient(0, 356, 0, 380);
    hoverGradient.addColorStop(0, 'rgba(100, 200, 255, 0.4)');
    hoverGradient.addColorStop(1, 'rgba(100, 200, 255, 0)');
    ctx.fillStyle = hoverGradient;
    ctx.fillRect(0, 356, 800, 24);

    // Subtle pulsing particles to show energy movement
    for(let i = 0; i < 6; i++) {
        // Smoothly scroll right-to-left with game speed, wrapping seamlessly off-screen
        let px = ((i * 160 + 80 + lightScroll + 100) % 960 + 960) % 960 - 100;
        ctx.fillStyle = 'rgba(100, 200, 255, 0.3)';
        // Add a pseudo-random depth offset so they float at varying heights
        let depthOffset = (i * 17) % 24;
        ctx.fillRect(px, 356 + depthOffset + Math.sin(frameCount * 0.05 + i) * 5, 24, 2);
    }

    // 2. The Main Floating Slab
    ctx.fillStyle=`rgb(${groundBaseCol},${groundBaseCol},${groundBaseCol})`;
    ctx.fillRect(0,332,800,24); 

    // 3. Premium Neon Top Edge (matching platforms)
    ctx.fillStyle = '#00f2ff';
    ctx.fillRect(0, 332, 800, 3);
    
    // Subtle shadow/depth below neon edge
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 335, 800, 2);

    // 4. Pulsing Energy Core (matching platforms)
    let pulse = (Math.sin(frameCount * 0.1) + 1) / 2;
    ctx.fillStyle = `rgba(0, 242, 255, ${0.1 + pulse * 0.25})`;
    ctx.fillRect(0, 332 + 10, 800, 2);
}

function drawDistanceMarkers() {
    markers.forEach(m => {
        ctx.fillStyle = '#555';
        ctx.fillRect(m.x, m.y - 40, 4, 40); 
        ctx.fillStyle = '#ccc';
        ctx.fillRect(m.x - 20, m.y - 40, 44, 16); 
        ctx.fillStyle = '#000';
        ctx.font = '10px monospace';
        ctx.fillText(m.text, m.x - 18, m.y - 29);
    });
}

function drawClouds(){
    let t = getColorTransition();
    let r = Math.floor(128 + t * (190 - 128)); 
    let g = Math.floor(128 + t * (140 - 128));
    let b = Math.floor(128 + t * (160 - 128));
    ctx.fillStyle=`rgba(${r},${g},${b},0.5)`;
    clouds.forEach(c=>ctx.fillRect(c.x,c.y,c.size,c.size/2));
}

function drawPlayerBody(p, isTrail, alpha, colorOverride) {
    let recoilOffset=p.recoil>0?-2:0;
    ctx.save();
    
    // CLIPPING FIX: Ensure entities never draw below the floor line
    ctx.beginPath();
    ctx.rect(0, 0, 800, 332);
    ctx.clip();

    ctx.translate(p.x + p.w/2, p.y + 24);
    if (p.scaleX && p.scaleY) ctx.scale(p.scaleX, p.scaleY);
    ctx.translate(-(p.x + p.w/2), -(p.y + 24)); 

    if (isTrail) {
        ctx.fillStyle = colorOverride || `rgba(100, 200, 255, ${alpha})`;
        ctx.fillRect(p.x+recoilOffset, p.y-16, p.w, 32);
        let legSwing=Math.sin(p.frame*0.3)*2;
        ctx.fillRect(p.x-2+recoilOffset, p.y+16+legSwing, 4, 8);
        ctx.fillRect(p.x+14+recoilOffset, p.y+16-legSwing, 4, 8);
    } else {
        let t = getColorTransition();
        let bodyGray = Math.floor(255 - t * 200); 
        let bodyColor = colorOverride || `rgb(${bodyGray},${bodyGray},${bodyGray})`;
        ctx.fillStyle=bodyColor; ctx.fillRect(p.x+recoilOffset,p.y-16,p.w,32);
        ctx.fillStyle='black'; ctx.fillRect(p.x+2+recoilOffset,p.y-12,12,4);
        ctx.fillStyle=bodyColor;
        let legSwing=Math.sin(p.frame*0.3)*2;
        ctx.fillRect(p.x-2+recoilOffset, p.y+16+legSwing, 4, 8);
        ctx.fillRect(p.x+14+recoilOffset, p.y+16-legSwing, 4, 8);
        ctx.fillStyle='blue'; ctx.fillRect(p.x-4+recoilOffset,p.y-10,4,2);
        
        if(p.swinging){
            let sx=p.x+p.w/2, sy=p.y;
            let swingLength=40;
            let startAngle = Math.PI/4; 
            let angle=startAngle-(p.swingFrame/5)*(Math.PI/2);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.arc(sx, sy, swingLength, -startAngle, -angle, false);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle='silver';
            ctx.lineWidth=4;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx+swingLength*Math.cos(angle), sy-swingLength*Math.sin(angle));
            ctx.stroke();
        }
    }
    ctx.restore();
}

function drawPlayer(){
    if(gameOver) return;
    trails.forEach(t => drawPlayerBody(t, true, (t.life/t.maxLife)*0.4));
    drawPlayerBody(player, false, 1);
}

function drawShatter() {
    shatterParticles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
    });
}

function drawEnemies(){
    enemies.forEach(e=>{
        if(e.exploding>0){
            let progress=7-e.exploding;let offset=progress*2;
            if(e.exploding===1){ctx.fillStyle='white';ctx.beginPath();ctx.arc(e.x+e.w/2,e.y+e.h/2,14,0,Math.PI*2);ctx.fill();}
            else{ctx.fillStyle='orange';ctx.beginPath();ctx.arc(e.x+e.w/2-offset,e.y+e.h/2,7,Math.PI/2,Math.PI*3/2);ctx.arc(e.x+e.w/2+offset,e.y+e.h/2,7,-Math.PI/2,Math.PI/2);ctx.fill();}
            e.exploding--;if(e.exploding===0)e.remove=true;
        }else{
            if (e.type === 'dog') {
                e.frame++;
                ctx.fillStyle='#aab8c2'; ctx.fillRect(e.x, e.y, e.w, e.h); 
                ctx.strokeStyle='#00ffff'; ctx.lineWidth=2; ctx.strokeRect(e.x, e.y, e.w, e.h); 
                ctx.fillStyle='#00ffff'; ctx.fillRect(e.x+4, e.y+4, 4, 4);  
                let legOffset = Math.sin(e.frame * 0.5) * 4;
                ctx.fillStyle='#555'; 
                ctx.fillRect(e.x+4+legOffset, e.y+16, 4, 6);
                ctx.fillRect(e.x+20-legOffset, e.y+16, 4, 6);
            } else if (e.type === 'rival') {
                e.frame++;
                drawPlayerBody({
                    x: e.x, y: e.y, w: e.w, h: 32, frame: e.frame, recoil: 0, scaleX: 1, scaleY: 1
                }, false, 1, '#ff0033');
            } else {
                ctx.fillStyle='orange';ctx.beginPath();ctx.arc(e.x+12,e.y+12,14,0,Math.PI*2);ctx.fill();
                ctx.strokeStyle='lightyellow';ctx.beginPath();ctx.ellipse(e.x+12,e.y+12,18,7,Math.PI/6,0,Math.PI*2);ctx.stroke();
            }
        }
    });
}

function drawEnemyBullets() {
    enemyBullets.forEach(b => {
        if(b.deflected) {
            ctx.fillStyle = '#00ffff';
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='rgba(0,255,255,0.4)'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r+4, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='rgba(255,0,255,0.4)'; ctx.beginPath(); ctx.arc(b.x, b.y, b.r+4, 0, Math.PI*2); ctx.fill();
        }
    });
}

function drawPlatforms() {
    platforms.forEach(p => {
        ctx.fillStyle = '#222'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#00f2ff'; ctx.fillRect(p.x, p.y, p.w, 3);
        let pulse = (Math.sin(frameCount * 0.1) + 1) / 2;
        ctx.fillStyle = `rgba(0, 242, 255, ${0.1 + pulse * 0.3})`;
        ctx.fillRect(p.x + 10, p.y + p.h/2 - 1, p.w - 20, 2);
    });
}

function drawElectricWalls() {
    electricWalls.forEach(w => {
        ctx.save();
        const beamX = w.x + w.w/2;
        const beamY1 = w.y1;
        const beamY2 = w.y2;
        const drawNode = (nx, ny, isTop) => {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(nx - 10, ny - (isTop?0:10), 20, 10);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(nx - 4, ny - (isTop?-8:2), 8, 2); 
        };
        if (w.laserType !== 'FLOOR') drawNode(beamX, beamY1, true);
        if (w.laserType !== 'CEILING') drawNode(beamX, beamY2, false);
        if (w.laserType === 'GATE') { drawNode(beamX, beamY1, true); drawNode(beamX, beamY2, false); }

        let flicker = 0.8 + Math.random() * 0.2;
        ctx.shadowBlur = 8; ctx.shadowColor = "#ff0033";
        ctx.fillStyle = `rgba(255, 255, 255, ${flicker})`;
        ctx.fillRect(beamX - 1, beamY1 + (w.laserType==='FLOOR'?0:10), 2, (beamY2-(w.laserType==='CEILING'?0:10)) - (beamY1 + (w.laserType==='FLOOR'?0:10)));
        ctx.fillStyle = `rgba(255, 0, 50, ${flicker * 0.3})`;
        ctx.fillRect(beamX - 3, beamY1 + (w.laserType==='FLOOR'?0:10), 6, (beamY2-(w.laserType==='CEILING'?0:10)) - (beamY1 + (w.laserType==='FLOOR'?0:10)));
        if ((w.laserType === 'GATE' || w.laserType === 'FLOOR') && frameCount % 3 === 0) {
            sparks.push({x: beamX, y: 328, vx: (Math.random()-0.5)*4, vy: -Math.random()*3, life: 5});
        }
        ctx.restore();
    });
}

function drawCasings() {
    ctx.fillStyle = '#ffcc00'; 
    casings.forEach(c => {
        ctx.save();
        ctx.translate(c.x, c.y); ctx.rotate(c.rot);
        ctx.fillRect(-2, -1, 4, 2);
        ctx.restore();
    });
}

function drawGrass() {
    grassParticles.forEach(g => {
        ctx.save(); ctx.globalAlpha = g.life / g.maxLife; ctx.fillStyle = g.color;
        ctx.fillRect(g.x, g.y, g.w, g.h); ctx.restore();
    });
}

function drawBullets(){bullets.forEach(b=>{for(let t=0;t<3;t++){let tx=b.x-t*4;ctx.fillStyle=`rgba(255,50,50,${0.12*(3-t)})`;ctx.fillRect(tx,b.y-2,6,3);}ctx.fillStyle='red';ctx.fillRect(b.x,b.y-2,8,4);});}
function drawSparks(){sparks.forEach(s=>{ctx.fillStyle=`rgba(255,${200+Math.random()*55},0,${s.life/7})`;ctx.fillRect(s.x,s.y,2,2);});}
function drawMuzzleFlashes(){muzzleFlashes.forEach(f=>{ctx.fillStyle='white';ctx.fillRect(f.x,f.y,f.w,f.h);ctx.fillStyle='orange';ctx.fillRect(f.x,f.y+1,f.w-1,f.h-2);});}
function drawDust(){dusts.forEach(d=>{ctx.fillStyle=`rgba(120,80,40,${d.life/12})`;ctx.fillRect(d.x,d.y,3,2);});}

function drawFloatingTexts() {
    ctx.textAlign = 'center';
    floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(255, 255, 0, ${ft.life/30})`;
        ctx.font = 'bold 12px monospace';
        ctx.fillText(ft.text, ft.x, ft.y);
    });
    ctx.textAlign = 'left';
}

function drawText(){
    ctx.fillStyle='white';
    ctx.font='16px monospace';
    ctx.fillText('Score:'+score,650,20);
    ctx.fillText('High:'+highScore,650,40);
    if(!started&&!gameOver){
        ctx.fillText('Press W to jump, Space to shoot, D to swing',50,200);
    }
    if(gameOver){
        ctx.fillText('Game Over! Press W to jump, Space to shoot, D to swing',50,200);
    }
}

function drawObstacles(){
    let t = getColorTransition();
    let mainCol = `rgb(${Math.max(0, 128-t*100)},${Math.max(0, 128-t*100)},${Math.max(0, 128-t*100)})`; 
    let dotCol = `rgb(${Math.max(0, 169-t*140)},${Math.max(0, 169-t*140)},${Math.max(0, 169-t*140)})`;
    let outlineCol = t > 0.3 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.4)'; 
    obstacles.forEach(o=>{
        ctx.fillStyle=mainCol;
        ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.w/2,o.y-o.h);ctx.lineTo(o.x+o.w,o.y);ctx.closePath();ctx.fill();
        ctx.strokeStyle=outlineCol; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle=dotCol;
        ctx.beginPath();ctx.arc(o.x+o.w/2,o.y-o.h/2,o.h/4,0,Math.PI*2);ctx.fill();
    });
}

function spawnObstacle(){
    if (score > 4500 && Math.random() > 0.75) {
        let startX = 850;
        let choice = Math.random();
        if (choice < 0.5) {
            platforms.push({x: startX, y: 240, w: 100, h: 14});
            electricWalls.push({x: startX + 130, y1: 270, y2: 332, w: 6, laserType: 'FLOOR', closeCallTriggered: false});
            platforms.push({x: startX + 180, y: 170, w: 100, h: 14});
            electricWalls.push({x: startX + 310, y1: 220, y2: 332, w: 6, laserType: 'FLOOR', closeCallTriggered: false});
            platforms.push({x: startX + 360, y: 240, w: 100, h: 14});
            obstacleTimer = 260; lastObstacleCount = 3; return;
        } else {
            electricWalls.push({x: startX + 150, y1: 0, y2: 80, w: 6, laserType: 'CEILING', closeCallTriggered: false});
            electricWalls.push({x: startX + 150, y1: 230, y2: 332, w: 6, laserType: 'FLOOR', closeCallTriggered: false});
            obstacles.push({x: startX + 400, y: 332, w: 40, h: 30, closeCallTriggered: false});
            obstacleTimer = 220; lastObstacleCount = 3; return;
        }
    }
    let startX = 800;
    let choice = Math.random();
    if (score > 2500 && choice < 0.15) {
        obstacles.push({x: startX, y: 332, w: 48, h: 40, closeCallTriggered: false});
        obstacles.push({x: startX + 48, y: 332, w: 48, h: 75, closeCallTriggered: false});
        obstacles.push({x: startX + 96, y: 332, w: 48, h: 110, closeCallTriggered: false});
        lastObstacleCount = 3;
    } else if (score > 2500 && choice < 0.30) {
        obstacles.push({x: startX, y: 332, w: 48, h: 110, closeCallTriggered: false});
        obstacles.push({x: startX + 48, y: 332, w: 48, h: 75, closeCallTriggered: false});
        obstacles.push({x: startX + 96, y: 332, w: 48, h: 40, closeCallTriggered: false});
        lastObstacleCount = 3;
    } else if (score > 1500 && choice < 0.50) {
        let h = 90 + Math.random() * 30;
        obstacles.push({x: startX, y: 332, w: 48, h: h, closeCallTriggered: false});
        lastObstacleCount = 1;
    } else if (score > 1000 && choice < 0.70) {
        let h = 50 + Math.random() * 30;
        obstacles.push({x: startX, y: 332, w: 48, h: h, closeCallTriggered: false});
        obstacles.push({x: startX + 48, y: 332, w: 48, h: h, closeCallTriggered: false});
        lastObstacleCount = 2;
    } else {
        let h = 30 + Math.random() * 30;
        lastObstacleCount = Math.random() > 0.8 ? 2 : 1;
        for(let i=0; i<lastObstacleCount; i++) obstacles.push({x: startX + i*48, y: 332, w: 48, h: h, closeCallTriggered: false});
    }
}
function spawnCloud(){clouds.push({x:800,y:Math.random()*100+50,size:16+Math.random()*8});}

function spawnEnemy(){
    let type = 'orb';
    if (score > 6000 && Math.random() > 0.6) type = 'rival';
    else if (score > 3500 && Math.random() > 0.5) type = 'dog';
    if (type === 'dog') {
        enemies.push({type: 'dog', x: 800, y: 316, w: 32, h: 16, vx: speed * 1.3, vy: 0, exploding: 0, remove: false, frame: 0});
    } else if (type === 'rival') {
        enemies.push({type: 'rival', x: 800, y: 300, w: 16, h: 32, vx: speed, vy: 0, jumping: false, exploding: 0, remove: false, frame: 0, shootTimer: 40, hp: 2});
    } else {
        let yPos=170+Math.random()*100; let baseSpeed=speed+1.1+Math.random()*0.7;
        enemies.push({type: 'orb', x: 800, y: yPos, w: 28, h: 28, vy: Math.random()*1-0.5, vx: baseSpeed, exploding: 0, remove: false});
    }
}

function spawnSparks(x,y){for(let i=0;i<10;i++)sparks.push({x:x,y:y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:7});}
function spawnMuzzleFlash(ex, ey){let flashWidth=4+Math.random()*4;muzzleFlashes.push({x:ex,y:ey,w:flashWidth,h:4,life:2});}

function pollGamepad() {
    const gamepads = navigator.getGamepads();
    const gp = gamepads[0] || gamepads[1];
    if (gp) {
        if (gp.buttons[1].pressed && !lastGamepadButtons[1]) {
            initAudio();
            if (gameOver) resetGame();
            else if (!started) { if (readyToStart) { started=true; readyToStart=false; AudioSys.startMusic(); } }
            else jump();
        }
        if (!gp.buttons[1].pressed && !started && !gameOver) readyToStart = true;
        if ((gp.buttons[4].pressed || gp.buttons[5].pressed) && (!lastGamepadButtons[4] && !lastGamepadButtons[5])) shoot();
        const deadzone = 0.5;
        const stickMagnitude = Math.sqrt(gp.axes[0]**2 + gp.axes[1]**2);
        if (stickMagnitude > deadzone) {
            if (!lastGamepadStickActive) {
                swing();
                lastGamepadStickActive = true;
            }
        } else {
            lastGamepadStickActive = false;
        }
        if (gp.buttons[0].pressed) keysDown['KeyS'] = true; else keysDown['KeyS'] = false;
        gp.buttons.forEach((btn, i) => lastGamepadButtons[i] = btn.pressed);
    }
}

function update(){
    pollGamepad();
    if(gameOver){
        shatterParticles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += gravity * 0.1; 
            p.rot += p.vrot;
        });
        return;
    }
    if(!started)return;
    player.scaleX += (1 - player.scaleX) * 0.2;
    player.scaleY += (1 - player.scaleY) * 0.2;
    if (frameCount % 3 === 0 && (player.jumping || speed > 6)) trails.push({x: player.x, y: player.y, frame: player.frame, life: 10, maxLife: 10, scaleX: player.scaleX, scaleY: player.scaleY, recoil: player.recoil});
    trails.forEach((t,i)=>{ t.life--; if(t.life<=0) trails.splice(i,1); });
    if (!player.jumping && frameCount % 8 === 0) {
        const color = Math.random() > 0.5 ? '#999' : '#ccc'; 
        grassParticles.push({x: player.x + 4 + Math.random()*8, y: player.y + 24, vx: -speed * 0.4 - Math.random() * 1, vy: -1 - Math.random() * 2, w: 1 + Math.random() * 2, h: 2 + Math.random() * 4, color: color, life: 15, maxLife: 15});
    }
    grassParticles.forEach((g,i)=>{ g.x += g.vx; g.y += g.vy; g.vy += 0.15; g.vx *= 0.98; g.life--; if(g.life<=0) grassParticles.splice(i,1); });
    casings.forEach((c,i)=>{ c.x += c.vx; c.y += c.vy; c.vy += 0.5; c.rot += 0.2; if(c.y > 330) { c.y = 330; c.vy *= -0.5; c.vx *= 0.5; } c.life--; if(c.life<=0) casings.splice(i,1); });
    floatingTexts.forEach((ft,i)=>{ ft.y -= 0.5; ft.life--; if(ft.life<=0) floatingTexts.splice(i,1); });
    markers.forEach((m,i)=>{ m.x -= speed; if(m.x < -50) markers.splice(i,1); });
    if(score >= nextMarkerScore) { markers.push({x: 850, y: 332, text: nextMarkerScore + "m"}); nextMarkerScore += 1000; }
    if (player.coyoteTime > 0) player.coyoteTime--;
    if (player.jumpBuffer > 0) player.jumpBuffer--;
    if(score >= 2000) { if(transitionTimer <= 0) { if(targetTransition === 1) { targetTransition = 0; transitionTimer = 300 + Math.random() * 600; } else { targetTransition = 1; transitionTimer = 120 + Math.random() * 180; } } else { transitionTimer--; } currentTransition += (targetTransition - currentTransition) * 0.008; }
    
    player.frame++; player.vy+=gravity;
    if(keysDown['KeyS']&&player.jumping)player.vy+=fastFallPower;
    let wasAir=player.jumping; player.y+=player.vy;
    let onPlatform = false;
    platforms.forEach(p => {
        const feetY = player.y + player.h;
        const prevFeetY = feetY - player.vy;
        if (player.vy >= 0 && player.x + player.w > p.x && player.x < p.x + p.w && feetY >= p.y && prevFeetY <= p.y + 16) {
            player.y = p.y - player.h; player.vy = 0; player.jumping = false; onPlatform = true;
            player.coyoteTime = 6; if(wasAir) { player.scaleX = 1.4; player.scaleY = 0.6; } 
            if (player.jumpBuffer > 0) { player.jumpBuffer = 0; executeJump(); }
        }
    });
    if(player.y>300){
        player.y=300;player.vy=0;player.jumping=false; player.coyoteTime = 6;
        if(wasAir){ player.scaleX = 1.4; player.scaleY = 0.6; for(let i=0;i<6;i++) dusts.push({x:player.x+6+Math.random()*8,y:player.y+18,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:12}); if (player.jumpBuffer > 0) { player.jumpBuffer = 0; executeJump(); } }
    } else if (!onPlatform && player.y < 300) { player.jumping = true; }

    if(obstacleTimer <= 0) { spawnObstacle(); obstacleTimer = Math.max(35, 85 - speed * 3) + (lastObstacleCount - 1) * 15; } else { obstacleTimer--; }
    if(enemyTimer <= 0) { spawnEnemy(); enemyTimer = Math.max(40, 95 - speed * 3); } else { enemyTimer--; }
    if(frameCount%200===0)spawnCloud();
    if(frameCount%240===0){let change=(Math.random()*2-1)*1.5;speed+=change;if(speed<4)speed=4;if(speed>11)speed=11;}
    obstacles.forEach(o=>o.x-=speed); obstacles=obstacles.filter(o=>o.x+o.w>0);
    platforms.forEach(p=>p.x-=speed); platforms=platforms.filter(p=>p.x+p.w>0);
    electricWalls.forEach(w=>w.x-=speed); electricWalls=electricWalls.filter(w=>w.x+w.w>0);
    clouds.forEach(c=>c.x-=1); clouds=clouds.filter(c=>c.x+c.size>0);
    stars.forEach(s=>{s.x-=s.speed;if(s.x<0)s.x=800;});
    planets.forEach(p=>{p.x-=p.speed;if(p.x<-p.size)p.x=800+Math.random()*200;});
    
    enemies.forEach(e=>{ 
        if(!e.exploding){ 
            e.x-=e.vx; 
            if(e.type==='orb') { e.y+=e.vy; if(e.y<150||e.y>300)e.vy*=-1; } 
            if(e.type==='rival') { 
                e.vy += gravity;
                e.y += e.vy;
                if(e.y > 300) { e.y = 300; e.vy = 0; e.jumping = false; }
                if(!e.jumping && Math.random() < 0.015) { e.vy = jumpPower; e.jumping = true; }
                e.shootTimer--; 
                if(e.shootTimer <= 0) { 
                    enemyBullets.push({x: e.x, y: e.y + 2, r: 4, vx: speed + 4, deflected: false}); 
                    spawnMuzzleFlash(e.x, e.y + 2);
                    e.shootTimer = 60 + Math.random() * 40; 
                } 
            } 
        } 
    });
    enemies=enemies.filter(e=>!e.remove&&e.x>-50);

    enemyBullets.forEach(b => {
        if(b.deflected) {
            b.x += 12; 
            enemies.forEach(e => {
                if(!e.exploding) {
                    let eHitX = e.x; let eHitY = e.y; let eW = e.w; let eH = e.type==='orb'?28:32;
                    if(b.x > eHitX && b.x < eHitX + eW && b.y > eHitY && b.y < eHitY + eH) {
                        e.exploding=7; AudioSys.explode(); spawnSparks(eHitX+eW/2, eHitY+eH/2);
                        b.remove = true; score += 100; 
                    }
                }
            });
        } else {
            b.x -= b.vx; 
        }
    });
    enemyBullets = enemyBullets.filter(b => b.x > -50 && b.x < 900 && !b.remove);

    bullets.forEach((b,i)=>{
        b.x+=12;
        sparks.push({x:b.x-2,y:b.y,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:5});
        enemyBullets.forEach(eb => { if (!b.remove && !eb.remove && Math.abs(b.x - eb.x) < 16 && Math.abs(b.y - eb.y) < 16) { b.remove = true; eb.remove = true; spawnSparks(b.x, b.y); AudioSys.explode(); } });
        enemies.forEach(e=>{ 
            if(!e.exploding && !b.remove && e.type !== 'dog') { 
                let eHitX = e.x; let eHitY = e.y; let eW = e.w; let eH = e.type==='orb'?28:32; 
                if(b.x > eHitX && b.x < eHitX + eW && b.y > eHitY && b.y < eHitY + eH) { 
                    b.remove=true;
                    if (e.type === 'rival') {
                        e.hp--;
                        if (e.hp <= 0) {
                            e.exploding=7; AudioSys.explode(); spawnSparks(eHitX+eW/2, eHitY+eH/2); score+=50; shake=Math.max(shake, 8);
                        }
                    } else {
                        e.exploding=7; AudioSys.explode(); spawnSparks(eHitX+eW/2, eHitY+eH/2); score+=12; shake=Math.max(shake, 6); 
                    }
                } 
            } 
        });
    });
    bullets=bullets.filter(b=>!b.remove&&b.x<820);

    if(player.swinging){
        let swingLength=40;let angle=Math.PI/4-(player.swingFrame/5)*(Math.PI/2);let sx=player.x+player.w/2,sy=player.y;
        enemyBullets.forEach(eb => {
            if(!eb.deflected) {
                let dx = eb.x - sx, dy = eb.y - sy;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < swingLength + 20) {
                    eb.deflected = true;
                    eb.vx = -12; 
                    spawnSparks(eb.x, eb.y);
                    AudioSys.shoot();
                }
            }
        });
        enemies.forEach(e=>{ 
            let eHitX = e.x+e.w/2; let eHitY = e.y+e.h/2; 
            let dx=eHitX-sx, dy=eHitY-sy; let dist=Math.sqrt(dx*dx+dy*dy); 
            if(!e.exploding&&dist<swingLength+12){ 
                e.exploding=7; AudioSys.explode(); spawnSparks(eHitX,eHitY); 
                score+=(e.type==='rival'?50:12); shake=Math.max(shake, 8); 
            } 
        });
        player.swingFrame++;if(player.swingFrame>5){player.swinging=false;player.swingFrame=0;}
    }

    if(player.recoil>0)player.recoil--;
    sparks.forEach((s,i)=>{s.x+=s.vx;s.y+=s.vy;s.vx*=0.95;s.vy*=0.95;s.life--;if(s.life<=0)sparks.splice(i,1);});
    muzzleFlashes.forEach((f,i)=>{f.life--;if(f.life<=0)muzzleFlashes.splice(i,1);});
    dusts.forEach((d,i)=>{d.x+=d.vx;d.y+=d.vy;d.vy+=0.2;d.life--;if(d.life<=0)dusts.splice(i,1);});
    if(shootCooldown>0)shootCooldown--;
    const crashGame = (shakeAmt) => { 
        gameOver=true; AudioSys.crash(); AudioSys.stopMusic(); if(score>highScore)highScore=score; shake=shakeAmt; 
        for(let i=0; i<30; i++) {
            shatterParticles.push({
                x: player.x + player.w/2,
                y: player.y + 16,
                vx: (Math.random() - 0.2) * -6,
                vy: (Math.random() - 1) * 5,
                vrot: (Math.random() - 0.5) * 0.2,
                rot: Math.random() * Math.PI * 2,
                size: 2 + Math.random() * 4,
                color: '#ffffff'
            });
        }
    };
    obstacles.forEach(o=>{ let hitX = o.x + o.w * 0.25; let hitW = o.w * 0.5; let hitY = o.y - o.h * 0.7; if(player.x < hitX + hitW && player.x + player.w > hitX && player.y + player.h > hitY) crashGame(12); else if (!o.closeCallTriggered && player.x + player.w > hitX - 15 && player.x < hitX + hitW + 15) { if (player.y + player.h <= hitY && player.y + player.h > hitY - 20) { o.closeCallTriggered = true; floatingTexts.push({x: hitX + hitW/2, y: hitY - 10, text: "*close call*", life: 40}); } } });
    electricWalls.forEach(w=>{ 
        const beamX = w.x + w.w/2;
        if(player.x < beamX + 3 && player.x + player.w > beamX - 3 && player.y + player.h > w.y1 && player.y < w.y2) crashGame(16); 
        else if (!w.closeCallTriggered && player.x + player.w > beamX - 15 && player.x < beamX + 15) { if ((player.y + player.h <= w.y1 && player.y + player.h > w.y1 - 15) || (player.y >= w.y2 && player.y < w.y2 + 15)) { w.closeCallTriggered = true; floatingTexts.push({x: beamX, y: (w.laserType === 'CEILING' ? w.y2 + 10 : w.y1 - 10), text: "*close call*", life: 40}); } } 
    });
    enemyBullets.forEach(eb=>{ if(!eb.deflected && !eb.remove && player.x<eb.x+eb.r&&player.x+player.w>eb.x-eb.r&&player.y+player.h>eb.y-eb.r&&player.y<eb.y+eb.r) crashGame(12); });
    enemies.forEach(e=>{ if(!e.exploding){ let eH = e.type==='orb'?28:(e.type==='dog'?16:32); if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y+player.h>e.y&&player.y<e.y+eH) crashGame(14); } });
    score++; if(score%150===0) { speed+=0.5; if(speed>11)speed=11; }
}

function jump(){ if(gameOver) return; if(!player.jumping || player.coyoteTime > 0) executeJump(); else player.jumpBuffer = 8; }
function executeJump() { player.vy=jumpPower; player.jumping=true; player.coyoteTime = 0; player.scaleX = 0.6; player.scaleY = 1.4; AudioSys.jump(); initAudio(); }
function shoot() { if(!gameOver&&shootCooldown===0&&started){ bullets.push({x:player.x+player.w+4,y:player.y+player.h/2-14}); casings.push({x: player.x + player.w/2, y: player.y - 8, vx: -2 - Math.random()*3, vy: -3 - Math.random()*3, rot: Math.random()*Math.PI, life: 60}); spawnMuzzleFlash(player.x+player.w, player.y+player.h/2-14); AudioSys.shoot(); initAudio(); shootCooldown=6;player.recoil=3; } }
function swing() { if(!player.swinging&&!gameOver&&started){ player.swinging=true;player.swingFrame=0; AudioSys.sword(); initAudio(); } }
function resetGame(){ gameOver=false;obstacles=[];clouds=[];enemies=[];bullets=[];sparks=[];muzzleFlashes=[]; enemyBullets=[];platforms=[];electricWalls=[]; trails=[]; grassParticles=[]; casings=[]; floatingTexts=[]; markers=[]; shatterParticles=[]; player.y=300;player.vy=0;score=0;speed=5;frameCount=0;player.recoil=0;started=false; player.jumping=false; player.coyoteTime=0; player.jumpBuffer=0; player.scaleX=1; player.scaleY=1; readyToStart = true; currentTransition = 0; targetTransition = 0; transitionTimer = 0; nextMarkerScore=1000; obstacleTimer = 0; enemyTimer = 40; lastObstacleCount = 1; lastGamepadStickActive = false; groundScroll = 0; lightScroll = 0; AudioSys.stopMusic(); }

document.addEventListener('keydown',e=>{
    keysDown[e.code]=true;
    if(e.code==='KeyW'){ initAudio(); if(gameOver){ resetGame(); } else if(!started){ if (readyToStart) { started=true; readyToStart=false; AudioSys.startMusic(); } } else { jump(); } }
    if(e.code==='Space') shoot();
    if(e.code==='KeyD') swing();
});
document.addEventListener('keyup',e=>{ keysDown[e.code]=false; if(e.code==='KeyW' && !started && !gameOver) readyToStart = true; });

function loop(){
    frameCount++;
    ctx.save();
    applyShake();
    drawStars();
    drawClouds(); 
    drawDistanceMarkers();
    drawGround();
    drawPlatforms();
    drawElectricWalls();
    drawObstacles();
    drawEnemies();
    drawEnemyBullets();
    drawBullets();
    drawPlayer(); 
    drawShatter();
    drawCasings();
    drawGrass();
    drawSparks();
    drawMuzzleFlashes();
    drawDust();
    drawFloatingTexts();
    drawText();
    ctx.restore();
    if(!started&&!gameOver)player.frame++;
    update();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
